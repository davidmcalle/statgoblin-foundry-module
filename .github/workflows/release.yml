name: Release

# On every push to main, read the version from package.json; if no git tag exists
# for it yet, build and cut a GitHub release (tag + module.json + module.zip).
# Bump "version" in package.json (semver, no "v" prefix) to release.
on:
  push:
    branches: [main]

permissions:
  contents: write # create the tag/release and upload assets

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.decide.outputs.publish }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need tags to know what's already released
      - id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - id: decide
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.version }}" >/dev/null; then
            echo "Tag ${{ steps.ver.outputs.version }} already exists — no release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${{ steps.ver.outputs.version }} is new — will release."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          MODULE_VERSION: ${{ needs.check.outputs.version }}
          GH_PROJECT: ${{ github.repository }}
          GH_TAG: ${{ needs.check.outputs.version }}
        run: npm run build

      - name: Package module.zip
        run: cd dist && zip -r ../module.zip .

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check.outputs.version }}
          generate_release_notes: true
          files: |
            dist/module.json
            module.zip
